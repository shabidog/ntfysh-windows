name: Build and Release

on:
  push:
    branches: [main]
    tags: ['*']
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 6.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ntfysh_client/bin/Release/net6.0-windows/
          retention-days: 7

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 6.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Publish (framework-dependent)
        run: dotnet publish -c Release -o publish

      - name: Package ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path publish\* -DestinationPath ntfysh-windows-${{ github.ref_name }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ntfysh-windows-*.zip
          generate_release_notes: true